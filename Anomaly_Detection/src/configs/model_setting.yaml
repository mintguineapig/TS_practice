LSTM_AE:
  feature_num: 5
  rnn_type: 'LSTM'
  rnn_inp_size: 64
  rnn_hid_size: 128
  nlayers: 2
  dropout: 0.1
  res_connection: false
  return_hiddens: false
  # RevIN 설정
  use_revin: true           # RevIN 사용 여부
  revin_affine: true        # 학습 가능한 γ, β 파라미터 사용 여부
  revin_subtract_last: false  # true 시 평균 대신 마지막 시점 값 기준으로 정규화
  revin_eps: 0.00001        # 수치 안정성을 위한 epsilon
