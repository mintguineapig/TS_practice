DEFAULT:
  exp_name: AnomalyDetection
  seed: 42

DATASET:
  datadir: ../../Time-series-AD_2025/src/datasets
  dataname: PSM
  scaler: standard
  batch_size: 128
  shuffle: true
  num_workers: 0
  pin_memory: true
  drop_last: False
  seq_len: 100
  stride_len: 1
  target: ['case1']
  val_split_rate: 0.1
  bank_name: ['IUR']
  merge_bank: False
  time_embedding: []
  del_feature: null

TRAIN:
  epoch: 10
  ckp_metric: loss
  eval_epochs: 1
  log_epochs: 1
  log_eval_iter: 100
  early_stopping_count: 5
  resume: null
  pre_training: false
  data_num: 0
  fine_tuning_method: full
  grad_accum_steps: 1
  mixed_precision: 'no'
  early_stopping_metric: loss
  lradj: 'type1'
  return_output: false
  plot_result: false
  del_pt_file: false
  wandb: 
    use: false
    iter: 500
    exp_name: default
    project_name: 'KoreaBank'
    entity: jinwoo
LOSS:
  loss_name: mse

OPTIMIZER:
  opt_name: adamw
  lr: 0.0001
  params:
    weight_decay: 0.0005

RESULT:
  savedir: './saved_model'