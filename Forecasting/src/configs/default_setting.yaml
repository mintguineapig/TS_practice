DEFAULT:
  exp_name: forecasting 
  seed: 42

DATASET:
  datadir: ./dataset
  dataname: [ETTh1, ETTh2, ETTm1, ETTm2]
  scaler: standard
  batch_size: 128
  shuffle: true
  num_workers: 0
  pin_memory: true
  drop_last: False
  seq_len: 336
  label_len: 0
  pred_len: 96
  split_rate: [0.7, 0.1, 0.2]
  time_embedding: [0, 'd']
  del_feature: null

TRAIN:
  epoch: 100
  ckp_metric: MSE
  eval_epochs: 1
  log_epochs: 1
  log_eval_iter: 100
  early_stopping_count: 5
  resume: null
  pre_training: false
  data_num: 0
  fine_tuning_method: full
  grad_accum_steps: 1
  mixed_precision: 'no'
  early_stopping_metric: 'MSE'
  lradj: 'type1'
  pct_start: 0.4
  return_output: false
  del_pt_file: True
  wandb: 
    use: false
    iter: 50
    exp_name: experiment1
    project_name: 2026_TS_Forecasting
    entity: hayeon
LOSS:
  loss_name: mse

OPTIMIZER:
  opt_name: adamw
  lr: 0.0001
  params:
    weight_decay: 0.0005

RESULT:
  savedir: './saved_model'